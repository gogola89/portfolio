<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    {% load static %}
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}{{ site_settings.site_title|default:"GEORGE OGOLA // Architect" }}{% endblock %}</title>
    <meta name="description" content="{{ site_settings.site_tagline|default:"Senior Backend & DevOps Engineer - Python & Cloud Specialist" }}"/>

    <!-- Favicon -->
    <link rel="icon" href="{% static 'favicon/favicon.ico' %}" sizes="any"/>
    <link rel="icon" href="{% static 'favicon/favicon-32x32.png' %}" type="image/png" sizes="32x32"/>
    <link rel="icon" href="{% static 'favicon/favicon-16x16.png' %}" type="image/png" sizes="16x16"/>
    <link rel="apple-touch-icon" href="{% static 'favicon/apple-touch-icon.png' %}" sizes="180x180"/>
    <link rel="manifest" href="{% static 'favicon/site.webmanifest' %}"/>

    <!-- Fonts - Using system fonts as fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#93000a",
              "on-surface": "#dee0ff",
              "tertiary-fixed": "#ffddb8",
              "error": "#ffb4ab",
              "tertiary": "#ffddb8",
              "on-error": "#690005",
              "outline": "#859398",
              "on-primary-container": "#005b6c",
              "surface-tint": "#00d9ff",
              "inverse-on-surface": "#2b2f49",
              "tertiary-container": "#ffb95f",
              "on-primary-fixed": "#001f26",
              "surface-variant": "#2f334e",
              "on-tertiary-fixed-variant": "#653e00",
              "on-secondary-fixed": "#002113",
              "background": "#0d112a",
              "surface-container-lowest": "#080c25",
              "on-tertiary": "#472a00",
              "secondary-fixed": "#6ffbbe",
              "primary": "#afecff",
              "secondary-fixed-dim": "#4edea3",
              "on-primary-fixed-variant": "#004e5d",
              "outline-variant": "#3c494d",
              "primary-fixed": "#aeecff",
              "surface-dim": "#0d112a",
              "primary-container": "#00d9ff",
              "surface-container-low": "#161a33",
              "primary-fixed-dim": "#00d9ff",
              "on-primary": "#003641",
              "on-secondary-container": "#00311f",
              "tertiary-fixed-dim": "#ffb95f",
              "surface-container": "#1a1e37",
              "secondary": "#4edea3",
              "inverse-surface": "#dee0ff",
              "surface-bright": "#343752",
              "secondary-container": "#00a572",
              "surface-container-highest": "#2f334e",
              "on-error-container": "#ffdad6",
              "on-tertiary-fixed": "#2a1700",
              "on-background": "#dee0ff",
              "surface-container-high": "#242842",
              "surface": "#0d112a",
              "on-secondary-fixed-variant": "#005236",
              "inverse-primary": "#00687b",
              "on-surface-variant": "#bbc9ce",
              "on-tertiary-container": "#754900",
              "on-secondary": "#003824"
            },
            fontFamily: {
              "headline": ["Space Grotesk", "Impact", "Arial Black", "sans-serif"],
              "body": ["Inter", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "sans-serif"],
              "label": ["JetBrains Mono", "Consolas", "Monaco", "Courier New", "monospace"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
    
    <!-- Custom Styles -->
    <style>
        body {
            background-color: #0d112a;
            background-image:
                linear-gradient(rgba(60, 73, 77, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(60, 73, 77, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #dee0ff;
        }
        .glass-card {
            background: rgba(26, 30, 55, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .neon-glow-cyan {
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.15);
        }
        .neon-glow-emerald {
            box-shadow: 0 0 20px rgba(78, 222, 163, 0.15);
        }
        .terminal-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
        /* Loading spinner */
        .spinner {
            border: 2px solid rgba(0, 217, 255, 0.1);
            border-radius: 50%;
            border-top: 2px solid #00d9ff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 0.25rem;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-success {
            background: rgba(0, 165, 114, 0.9);
            color: white;
        }
        .toast-error {
            background: rgba(147, 0, 10, 0.9);
            color: white;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="font-body selection:bg-primary/30 selection:text-primary">
    {% block content %}{% endblock %}
    
    <!-- Toast Container -->
    <div id="toast-container"></div>
    
    <!-- Scripts -->
    <script>
        // CSRF Token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');
        
        // Toast notification function
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            
            // Trigger reflow
            void toast.offsetWidth;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
